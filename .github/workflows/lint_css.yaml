name: Lint CSS

on:
  workflow_call:
  workflow_dispatch:

jobs:
  lint_css:
    name: Lint CSS code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
      - name: Install Stylelint
        run: |
          npm install -g stylelint stylelint-config-standard
      - name: Run Stylelint
        run: |
          stylelint \
            "src/style.css" \
            --config config/stylelint.json
