<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Now</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #111; color: #eee; }
        .clocks { display: flex; gap: 4rem; text-align: center; }
        .clock h2 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 0.1em; color: #aaa; margin-bottom: 0.5rem; }
        .clock .time { font-size: 3.5rem; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>
    <div class="clocks">
        <div class="clock">
            <h2>US Pacific</h2>
            <div class="time" id="us-pacific">--:--:--</div>
        </div>
        <div class="clock">
            <h2>US Eastern</h2>
            <div class="time" id="us-eastern">--:--:--</div>
        </div>
        <div class="clock">
            <h2>GMT</h2>
            <div class="time" id="gmt">--:--:--</div>
        </div>
        <div class="clock">
            <h2>EU Eastern</h2>
            <div class="time" id="eu-eastern">--:--:--</div>
        </div>
    </div>
  <script>
    function formatTime(date, timeZone) {
      return date.toLocaleTimeString('en-US', { timeZone, hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function tick() {
      const now = new Date();
      document.getElementById('us-pacific').textContent = formatTime(now, 'America/Los_Angeles');
      document.getElementById('us-eastern').textContent = formatTime(now, 'America/New_York');
      document.getElementById('gmt').textContent = formatTime(now, 'GMT');
      document.getElementById('eu-eastern').textContent = formatTime(now, 'Europe/Bucharest');
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
